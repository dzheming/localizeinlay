# If build fails with: ...\\.jdks\\ms-17.*\\Packages does not exist (Windows + Microsoft OpenJDK in ~/.jdks)
# 1) IDEA: Settings | Build, Execution, Deployment | Build Tools | Gradle | Gradle JVM -> use Temurin or JetBrains Runtime, not "ms-17".
# 2) Or point Gradle at a full JDK 17 install (slashes doubled for Windows paths):
# org.gradle.java.home=C:\\software\\jdk-17.0.12
# 3) Last resort: create an empty folder named "Packages" next to bin/conf in that JDK (see microsoft/openjdk#339).

# IPGP 2.13.x requires Gradle 9.0+; wrapper is set to 9.4.1 in gradle-wrapper.properties.

